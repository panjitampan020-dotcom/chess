<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Simulator with Stockfish AI</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; }
        #board { width: 400px; height: 400px; display: grid; grid-template-columns: repeat(8, 1fr); }
        .square { width: 50px; height: 50px; }
        .black { background-color: #769656; }
        .white { background-color: #eeeed2; }
    </style>
</head>
<body>
    <div id="board"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stockfish/11.0.0/stockfish.js"></script>
    <script>
        const board = document.getElementById("board");
        const stockfish = new Worker("https://cdnjs.cloudflare.com/ajax/libs/stockfish/11.0.0/stockfish.js");

        function createBoard() {
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const square = document.createElement("div");
                    square.className = (i + j) % 2 === 0 ? "square white" : "square black";
                    board.appendChild(square);
                }
            }
        }

        stockfish.onmessage = function(event) {
            // Handle Stockfish messages here
            console.log(event.data);
        };

        createBoard();
    </script>
</body>
</html>
